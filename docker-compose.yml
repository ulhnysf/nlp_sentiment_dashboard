services:
  sentiment-dashboard:
    build: .
    container_name: nlp-sentiment-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./sentiment_dashboard.db:/app/sentiment_dashboard.db
    environment:
      - DATABASE_URL=sqlite:////app/sentiment_dashboard.db
      - CONFIDENCE_THRESHOLD=0.45
    command: >
      sh -c "python scripts/run_training.py && streamlit run app.py --server.address=0.0.0.0 --server.port=8501"
