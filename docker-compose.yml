services:
  sentiment-dashboard:
    build: .
    container_name: nlp-sentiment-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./docs:/app/docs
    environment:
      - DATABASE_URL=sqlite:////app/data/sentiment_dashboard.db
      - CONFIDENCE_THRESHOLD=0.80
    command: >
      sh -c "if [ ! -f models/best_model.joblib ]; then python scripts/run_training.py --dataset data/raw/sample_reviews.csv; fi &&
             streamlit run app.py --server.address=0.0.0.0 --server.port=8501"
